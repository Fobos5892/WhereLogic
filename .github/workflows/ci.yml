name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      package_release:
        description: Build OpenCV, package portable ZIP, upload artifact
        type: boolean
        default: false

env:
  QT_VERSION: "6.11.1"
  BUILD_DIR: build-ci

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Decide release build
        id: mode
        shell: pwsh
        run: |
          $release = $false
          if ("${{ github.event_name }}" -eq "release") { $release = $true }
          elseif ("${{ github.ref }}" -match '^refs/tags/v') { $release = $true }
          elseif ("${{ github.event_name }}" -eq "workflow_dispatch" -and "${{ inputs.package_release }}" -eq "true") {
            $release = $true
          }
          "release=$release" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          if ($release) {
            Write-Host "Release mode: OpenCV + portable ZIP"
          } else {
            Write-Host "CI mode: fast build with CONFIG+=no_opencv"
          }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          setup-python: false
          version: ${{ env.QT_VERSION }}
          host: windows
          target: desktop
          arch: win64_mingw
          modules: qthttpserver qtmultimedia
          # Qt 6.11 is built with MinGW 13.1 - an older tools_mingw triggers
          # Qt header static_assert failures around noexcept lambdas.
          tools: tools_mingw1310 tools_cmake tools_ninja
          cache: true
          add-tools-to-path: true
          # aqt 3.3.0 cannot install Qt 6.11+ on Windows (repo layout change)
          aqtsource: git+https://github.com/miurahr/aqtinstall.git@refs/pull/1000/head

      - name: Use MinGW 13.1 toolchain
        shell: pwsh
        run: |
          $candidates = @()
          if ($env:IQTA_TOOLS) {
            $candidates += (Join-Path $env:IQTA_TOOLS "mingw1310_64\bin")
          }
          if ($env:QT_ROOT_DIR) {
            $qtRootParent = Split-Path (Split-Path $env:QT_ROOT_DIR -Parent) -Parent
            $candidates += (Join-Path $qtRootParent "Tools\mingw1310_64\bin")
          }
          $candidates += @(
            "D:\a\WhereLogic\Qt\Tools\mingw1310_64\bin",
            "C:\Qt\Tools\mingw1310_64\bin"
          )
          $mingwBin = $candidates | Where-Object { Test-Path (Join-Path $_ "g++.exe") } | Select-Object -First 1
          if (-not $mingwBin) {
            Write-Host "Searched:"
            $candidates | ForEach-Object { Write-Host "  $_" }
            Get-ChildItem -Path ($env:IQTA_TOOLS, "D:\a\WhereLogic\Qt\Tools", "C:\Qt\Tools" | Where-Object { $_ -and (Test-Path $_) }) -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host "Found tools entry: $($_.FullName)" }
            throw "mingw1310_64 not found. Qt 6.11 requires MinGW 13.1."
          }
          $env:Path = "$mingwBin;$env:Path"
          "PATH=$env:Path" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "MinGW: $mingwBin"
          & (Join-Path $mingwBin "g++.exe") --version
          Write-Host "qmake: $(Get-Command qmake | Select-Object -ExpandProperty Source)"

      - name: Cache OpenCV prebuilt
        if: steps.mode.outputs.release == 'true'
        uses: actions/cache@v4
        with:
          path: |
            external/WhereLogicOpenCV/prebuilt
            external/WhereLogicOpenCV/.build
          key: opencv-mingw-${{ hashFiles('external/WhereLogicOpenCV/manifest.json', 'external/WhereLogicOpenCV/scripts/build_qt_mingw.ps1') }}
          restore-keys: |
            opencv-mingw-

      - name: Build and test
        shell: pwsh
        run: |
          # Do not use $args (automatic variable) - it breaks named binding and
          # can bind "-Configuration" into -BuildDir positionally.
          if ("${{ steps.mode.outputs.release }}" -eq "true") {
            & ./scripts/ci_build.ps1 -Configuration release -BuildDir "${{ env.BUILD_DIR }}" -RunTests
          } else {
            & ./scripts/ci_build.ps1 -Configuration release -BuildDir "${{ env.BUILD_DIR }}" -NoOpenCV -RunTests
          }

      - name: Package release archive
        if: steps.mode.outputs.release == 'true'
        shell: pwsh
        run: |
          $version = "${{ github.event.release.tag_name }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }
          & ./scripts/package_release.ps1 -Version $version -BuildDir "${{ env.BUILD_DIR }}"

      - name: Upload portable ZIP artifact
        if: steps.mode.outputs.release == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: WhereLogicGame-win64-portable
          path: |
            dist/WhereLogicGame-*-win64-portable.zip
            dist/WhereLogicGame-*-win64-portable.zip.sha256
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: steps.mode.outputs.release == 'true' && (startsWith(github.ref, 'refs/tags/') || github.event_name == 'release')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || github.ref_name }}
          files: |
            dist/WhereLogicGame-*-win64-portable.zip
            dist/WhereLogicGame-*-win64-portable.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
